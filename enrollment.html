<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UEP Enrollment</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f8eaea;
}

/* FIXED HEADER */

header{
    background:#800000;
    color:white;
    text-align:center;
    padding:25px 20px;

    position:fixed;
    top:0;
    left:0;
    width:100%;

    z-index:1000;
    box-sizing:border-box;
}

header h1{
    margin:0;
}

header p{
    margin-top:10px;
}

/* FIXED NAVIGATION */

nav{
    background:#a52a2a;

    display:flex;
    justify-content:center;
    align-items:center;
    gap:25px;

    padding:15px 10px;

    position:fixed;
    top:120px;
    left:0;
    width:100%;

    z-index:999;

    box-sizing:border-box;
}

nav a{
    color:white;
    text-decoration:none;
    font-weight:bold;
    font-size:18px;
}

nav a:hover{
    text-decoration:underline;
}

nav a.active{
    border-bottom:2px solid white;
}

.enroll-btn{
    background:#800000;
    padding:10px 18px;
    border-radius:5px;
}

/* CONTENT */

.container{
    max-width:900px;
    margin:220px auto 40px auto;
    background:white;
    padding:40px;
    border-radius:8px;
}

h2{
    color:#800000;
}

input,
textarea,
select{
    width:100%;
    padding:12px;
    margin-bottom:20px;
    border:1px solid #ccc;
    box-sizing:border-box;
}

textarea{
    resize:none;
    height:120px;
}

button{
    background:#800000;
    color:white;
    border:none;
    padding:14px;
    width:100%;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#a52a2a;
}

/* FOOTER */

footer{
    background:#800000;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:40px;
}

</style>

</head>

<body>

<header>

<h1>University of Eastern Pangasinan</h1>

<p>Binalonan Campus</p>

</header>

<nav>

<a href="FrontPage.html">Home</a>

<a href="about.html">About</a>

<a href="courses.html">Courses</a>

<a href="news.html">News</a>

<a href="enrollment.html" class="active enroll-btn">Enroll</a>

<a href="contact.html">Contact</a>

</nav>

<div class="container">

<h2>Student Enrollment Form</h2>

<form onsubmit="submitEnrollment(event)">

<input type="text" placeholder="Full Name" required>

<input type="date" required>

<select required>

<option value="">Select Gender</option>

<option>Male</option>

<option>Female</option>

</select>

<textarea placeholder="Home Address" required></textarea>

<input type="tel"
placeholder="Contact Number"
pattern="[0-9]{11}"
maxlength="11"
required>

<input type="email"
placeholder="Email Address"
required>

<input type="text"
placeholder="Parent/Guardian Name"
required>

<input type="tel"
placeholder="Parent Contact Number"
pattern="[0-9]{11}"
maxlength="11"
required>

<select required>

<option value="">Choose Course</option>

<option>Education</option>
<option>Hospitality Management</option>
<option>Criminology</option>
<option>Business Administration</option>
<option>Information Technology</option>
<option>Midwifery</option>
<option>Accountancy</option>
<option>Accounting Information System</option>

</select>

<select required>

<option value="">Select Year Level</option>

<option>1st Year</option>
<option>2nd Year</option>
<option>3rd Year</option>
<option>4th Year</option>

</select>

<input type="file" required>

<button type="submit">Submit Enrollment</button>

</form>

</div>

<footer>

<p>© 2026 University of Eastern Pangasinan</p>

</footer>

<script>

function submitEnrollment(event){

event.preventDefault();

alert("Enrollment submitted successfully!");

event.target.reset();

}

</script>

</body>
</html>
